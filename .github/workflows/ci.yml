name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  e2e:
    runs-on: ubuntu-latest
    needs: typecheck
    services:
      api:
        image: ghcr.io/juanpjacobi/finance-assistant:latest
        env:
          DATABASE_URL: sqlite+aiosqlite:///./finance.db
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
